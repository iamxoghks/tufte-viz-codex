<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sparkline Table Template</title>
  <style>
    :root { --paper: #fbfaf7; --ink: #171717; --muted: #6b665d; --rule: #c9c1b4; --faint: #e5e0d7; --focus: #b3261e; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--paper); color: var(--ink); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(960px, calc(100vw - 32px)); margin: 32px auto; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 52px); font-weight: 600; }
    p { margin: 0 0 18px; color: var(--muted); }
    .table-wrap { overflow-x: auto; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
    table { border-collapse: collapse; width: 100%; min-width: 720px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    th, td { padding: 10px; border-bottom: 1px solid var(--faint); text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 500; }
    svg { display: block; margin-left: auto; }
  </style>
</head>
<body>
  <main>
    <h1>Sparkline Table</h1>
    <p>Use when exact values and compact trend shape both matter.</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Metric</th><th>Trend</th><th>Start</th><th>End</th><th>Peak</th><th>Low</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
  <script>
    const data = [
      { name: "Revenue", values: [7, 12, 21, 25, 32, 54, 81, 97, 98, 95], unit: "$B" },
      { name: "Operating income", values: [-0.7, -1.6, -0.4, -0.1, 2, 6.5, 13.7, 8.9, 7.1, 4.4], unit: "$B" },
      { name: "Deliveries", values: [0.08, 0.10, 0.25, 0.37, 0.5, 0.94, 1.31, 1.81, 1.79, 1.64], unit: "M" }
    ];
    function el(name, attrs = {}, children = []) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attrs)) node.setAttribute(key, value);
      for (const child of children) node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
      return node;
    }
    function scale(domain, range) {
      const [d0, d1] = domain;
      const [r0, r1] = range;
      return value => r0 + ((value - d0) / (d1 - d0 || 1)) * (r1 - r0);
    }
    function path(points) {
      return points.map((p, i) => `${i ? "L" : "M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
    }
    function sparkline(values, width = 180, height = 34) {
      const min = Math.min(...values);
      const max = Math.max(...values);
      const x = scale([0, values.length - 1], [3, width - 3]);
      const y = scale([min, max], [height - 5, 5]);
      const svg = el("svg", { viewBox: `0 0 ${width} ${height}`, width, height, role: "img", "aria-label": "Sparkline trend" });
      svg.appendChild(el("path", { d: path(values.map((v, i) => [x(i), y(v)])), fill: "none", stroke: "var(--ink)", "stroke-width": 1.4 }));
      svg.appendChild(el("circle", { cx: x(values.length - 1), cy: y(values.at(-1)), r: 3, fill: "var(--focus)" }));
      return svg;
    }
    function fmt(value, unit) {
      return `${value < 0 ? "-" : ""}${unit.startsWith("$") ? "$" : ""}${Math.abs(value).toFixed(value < 2 ? 2 : 1)}${unit.replace("$", "")}`;
    }
    const tbody = document.getElementById("rows");
    for (const row of data) {
      const tr = document.createElement("tr");
      const cells = [row.name, sparkline(row.values), fmt(row.values[0], row.unit), fmt(row.values.at(-1), row.unit), fmt(Math.max(...row.values), row.unit), fmt(Math.min(...row.values), row.unit)];
      for (const cell of cells) {
        const td = document.createElement("td");
        if (typeof cell === "string") td.textContent = cell;
        else td.appendChild(cell);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  </script>
</body>
</html>
